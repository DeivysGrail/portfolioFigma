<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#C9C9C9;
    font-family:"Montserrat",sans-serif;
    padding:20px;
}

/* ---------- Bouton ---------- */

.portfolio-btn{

    display:flex;
    justify-content:center;
    align-items:center;

    width:min(90vw,420px);
    min-height:130px;

    padding:30px;

    background:#C9C9C9;
    color:white;
    text-decoration:none;
    text-align:center;

    font-size:clamp(2rem,5vw,3rem);
    font-weight:500;
    line-height:1.1;

    border-radius:8px;

    box-shadow:
        -8px -8px 16px rgba(255,255,255,.75),
         8px 8px 16px rgba(0,0,0,.18);

    cursor:pointer;

    user-select:none;
    -webkit-tap-highlight-color:transparent;
    will-change:transform;

    transition:
        transform .18s ease,
        box-shadow .18s ease;
}

/* Hover */

.portfolio-btn:hover{

    transform:translateY(-4px) scale(1.03);

    box-shadow:
        -12px -12px 22px rgba(255,255,255,.8),
         12px 12px 22px rgba(0,0,0,.22);

}

/* Clic */

.portfolio-btn:active{

    transform:scale(.98);

    box-shadow:
        inset -6px -6px 12px rgba(255,255,255,.7),
        inset 6px 6px 12px rgba(0,0,0,.18);

}

/* Mobile */

@media (max-width:600px){

    .portfolio-btn{

        width:100%;
        min-height:180px;

        font-size:2.4rem;

    }

}

</style>

</head>

<body>
